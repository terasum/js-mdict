name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Publish to npm (Trusted Publishing via OIDC)
        run: npm publish --provenance

      - name: Post-publish notification
        if: success()
        run: |
          echo "✅ Successfully published ${{ github.event.release.tag_name }} to npm"
          echo "📦 Package: https://www.npmjs.com/package/js-mdict"
